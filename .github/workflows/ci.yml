name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  shared-contracts-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run shared contracts drift guard
        run: node scripts/check-shared-contracts.mjs

  agora-ts-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agora-ts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: agora-ts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run strict TS quality gates
        run: npm run check:strict

      - name: Run scenario harness
        run: npm run scenario:all

  dashboard-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        run: npm ci

      - name: Install agora-ts workspace dependencies
        working-directory: agora-ts
        run: npm ci

      - name: Run strict dashboard quality gates
        run: npm run check:strict

  plugin-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/agora-plugin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: extensions/agora-plugin/package-lock.json

      - name: Install plugin dependencies
        run: npm ci

      - name: Install agora-ts workspace dependencies
        working-directory: agora-ts
        run: npm ci

      - name: Run strict plugin quality gates
        run: npm run check:strict
