name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  agora-ts-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agora-ts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: agora-ts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TS quality gates
        run: npm run check

  dashboard-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        run: npm ci

      - name: Run dashboard tests
        run: npm test

      - name: Run dashboard lint
        run: npm run lint

      - name: Run dashboard typecheck
        run: npx tsc -b

      - name: Run dashboard build
        run: npm run build

  plugin-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/agora-plugin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: extensions/agora-plugin/package-lock.json

      - name: Install plugin dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Test plugin
        run: npm test
