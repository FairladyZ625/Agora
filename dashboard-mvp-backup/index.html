<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agora Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>
      <h1>Agora Dashboard (MVP)</h1>
      <div class="controls">
        <label>API Base
          <input id="apiBase" value="/api" />
        </label>
        <label>Token
          <input id="apiToken" placeholder="Bearer token (optional)" />
        </label>
        <button id="refreshBtn">Refresh</button>
      </div>
    </header>

    <main>
      <section>
        <h2>Tasks</h2>
        <ul id="taskList"></ul>
      </section>

      <section>
        <h2>Task Detail</h2>
        <pre id="taskDetail">选择任务后查看详情</pre>
        <div class="review-panel">
          <button id="approveBtn">Archon Approve</button>
          <button id="rejectBtn">Archon Reject</button>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
