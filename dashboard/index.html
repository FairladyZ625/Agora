<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agora Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Anti-flicker: apply theme before render -->
    <script>
      (function () {
        try {
          var s = JSON.parse(localStorage.getItem('agora-theme'));
          var m = s && s.state && s.state.mode;
          var r = m;
          if (!m || m === 'system') {
            r = window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
          }
          document.documentElement.dataset.theme = r;
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
    <script>
      (function () {
        try {
          var motionState = JSON.parse(localStorage.getItem('agora-motion'));
          var motionMode = motionState && motionState.state && motionState.state.mode;
          document.documentElement.dataset.motion = motionMode === 'lite' ? 'lite' : 'full';
        } catch (e) {
          document.documentElement.dataset.motion = 'full';
        }
      })();
    </script>
    <script>
      (function () {
        try {
          var storedLocale = localStorage.getItem('agora-locale');
          var browserLocale = navigator.language || 'zh-CN';
          var resolvedLocale = storedLocale || browserLocale;
          document.documentElement.lang = /^en/i.test(resolvedLocale) ? 'en-US' : 'zh-CN';
        } catch (e) {
          document.documentElement.lang = 'zh-CN';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
